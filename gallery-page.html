<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="School Gallery - Photos from Ansar English School">
    <meta name="robots" content="index, follow">
    <title>Gallery - Ansar English School</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3498db; --dark: #2c3e50; --light: #7f8c8d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--dark); background: #f8f9fa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 20px 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { height: 50px; }
        nav { display: flex; gap: 30px; }
        nav a { color: var(--dark); text-decoration: none; }
        nav a:hover { color: var(--primary); }
        main { padding: 60px 0; }
        h1 { font-size: 36px; margin-bottom: 30px; text-align: center; }
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 15px; background: white; border: 1px solid var(--primary); color: var(--primary); border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 8px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); color: white; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; opacity: 0; transition: opacity 0.3s; }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        footer { background: var(--dark); color: white; padding: 40px 0 20px; margin-top: 60px; }
        @media (max-width: 768px) {
            nav { display: none; }
            h1 { font-size: 24px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <img src="https://ansarschool.in/logo.png" alt="Logo">
                    <div><h2 style="margin: 0; font-size: 16px;">ANSAR SCHOOL</h2></div>
                </div>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="admin.html">Admin</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <h1>School Gallery</h1>
        <div class="filters" id="filters"></div>
        <div class="gallery-grid" id="galleryGrid">
            <div style="text-align: center; padding: 40px; color: var(--light);">Loading gallery...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ansar English School. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="firebase-init.js"></script>
    <script>
        let allItems = [];
        let selectedCategory = 'All';

        async function loadGallery() {
            if (!window.db) {
                setTimeout(loadGallery, 1000);
                return;
            }

            try {
                const snapshot = await window.firebase.firestore().collection('gallery').orderBy('createdAt', 'desc').get();
                allItems = [];
                let categories = new Set(['All']);

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allItems.push(data);
                    if (data.category) categories.add(data.category);
                });

                // Render filters
                let filterHTML = '';
                categories.forEach(cat => {
                    filterHTML += `<button class="filter-btn ${cat === 'All' ? 'active' : ''}" onclick="filterGallery('${cat}')">${cat}</button>`;
                });
                document.getElementById('filters').innerHTML = filterHTML;

                displayGallery();
            } catch (error) {
                console.error('Error loading gallery:', error);
            }
        }

        function displayGallery() {
            let html = '';
            const items = selectedCategory === 'All' ? allItems : allItems.filter(item => item.category === selectedCategory);

            if (items.length === 0) {
                html = '<p style="text-align: center; padding: 40px; color: var(--light);">No images in this category.</p>';
            } else {
                items.forEach(item => {
                    html += `
                        <div class="gallery-item">
                            <img src="${item.imageUrl}" alt="${item.title}" loading="lazy">
                            <div class="gallery-overlay">
                                <h3 style="margin: 0;">${item.title}</h3>
                                <p style="margin: 0; font-size: 12px;">${item.description || ''}</p>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('galleryGrid').innerHTML = html;
        }

        window.filterGallery = (category) => {
            selectedCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayGallery();
        };

        setTimeout(() => loadGallery(), 2000);
    </script>
</body>
</html>
