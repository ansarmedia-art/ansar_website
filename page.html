<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ansar English School</title>
  <meta name="description" content="Dynamic Ansar English School page.">
  <link rel="icon" type="image/png" href="public/ansar-logo.png">
  <link rel="apple-touch-icon" href="public/ansar-logo.png">
  <link rel="stylesheet" href="styles.css">
  <script defer src="firebase-init.js"></script>
  <script type="module" defer src="site-app.js"></script>
</head>
<body data-page="dynamic">
  <header class="site-header">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="public/ansar-logo.png" alt="Ansar English School logo">
    </a>
    <div class="header-actions">
      <button class="login-button" type="button" data-auth-open>Login / Account</button>
    </div>
    <button class="nav-toggle" aria-label="Open menu" data-nav-toggle>Menu</button>
    <nav class="main-nav" data-main-nav aria-label="Primary navigation"></nav>
  </header>

  <main>
    <section class="page-hero" data-page-hero>
      <div>
        <p class="eyebrow" data-page-category>School</p>
        <h1 data-page-title>Ansar English School</h1>
        <p data-page-subtitle>Explore school information, activities, and updates.</p>
      </div>
    </section>
    <section class="section page-body" data-page-body>
      <p>This section is ready for live school content from the admin panel.</p>
    </section>
  </main>

  <footer class="site-footer" data-footer></footer>
  <div class="auth-modal" data-auth-modal hidden>
    <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <button class="auth-close" type="button" aria-label="Close login" data-auth-close>&times;</button>
      <p class="eyebrow">Secure access</p>
      <h2 id="authTitle">Login or create account</h2>
      <button class="google-button" type="button" data-google-login>Continue with Google</button>
      <form data-email-auth>
        <label>Email <input type="email" name="email" required autocomplete="email"></label>
        <label>Password <input type="password" name="password" required minlength="6" autocomplete="current-password"></label>
        <div class="button-group">
          <button class="btn-primary" type="submit" data-auth-mode="login">Login</button>
          <button class="btn-success" type="submit" data-auth-mode="create">Create Account</button>
        </div>
      </form>
      <button class="signout-button" type="button" data-signout hidden>Sign out</button>
      <p class="auth-note" data-auth-message>Admins are opened in the admin panel after verification. Other users remain on the website.</p>
    </div>
  </div>
</body>
</html>
