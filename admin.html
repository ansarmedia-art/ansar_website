<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ansar School</title>
    <link rel="icon" type="image/png" href="public/ansar-logo.png">
    <link rel="apple-touch-icon" href="public/ansar-logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0f2b46; /* Deep Academic Blue */
            --primary-light: #1a426b;
            --accent-color: #d4af37;  /* Subtle Gold */
            --bg-light: #f5f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: #333;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            flex: 0 0 250px;
            background: var(--primary-color);
            color: white;
            padding: 20px;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu li {
            margin-bottom: 10px;
        }

        .nav-menu button {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: background 0.3s;
        }

        .nav-menu button:hover,
        .nav-menu button.active {
            background: var(--accent-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .logout-btn {
            margin-top: 30px;
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .main-content {
            flex-grow: 1;
            min-width: 0; /* Prevents flex blowout on squeezed text */
            padding: 30px;
            overflow-y: auto;
        }

        .panel {
            display: none;
            animation: fadeIn 0.3s;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .panel h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 15px;
            background: white;
            padding: 15px;
            border-radius: 4px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .items-list {
            background: white;
            border-radius: 4px;
            overflow: hidden;
        }

        .item-card {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-card:last-child {
            border-bottom: none;
        }

        .item-content h3 {
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .item-content p {
            font-size: 13px;
            color: #7f8c8d;
            margin: 3px 0;
        }

        .item-actions {
            display: flex;
            gap: 10px;
        }

        .item-actions button {
            padding: 8px 15px;
            font-size: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .image-preview {
            max-width: 150px;
            max-height: 150px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
        }

        .stat-card h3 {
            color: #7f8c8d;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }

        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                padding: 15px;
            }

            .nav-menu {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <img src="https://i.ibb.co/JjbQmpgR/St-Sebastian-church-Purnattukara.png" alt="Logo" style="height:40px; object-fit:contain; background: white; border-radius: 4px; padding: 2px;">
        <button class="hamburger" id="adminHamburger">☰</button>
    </div>

    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="margin-bottom: 20px; background: white; padding: 10px; border-radius: 8px; text-align: center;">
                <img src="https://i.ibb.co/JjbQmpgR/St-Sebastian-church-Purnattukara.png" alt="Ansar School Logo" style="max-width: 100%; height: auto;">
            </div>
            <ul class="nav-menu">
                <li><button class="nav-btn active" data-panel="dashboard">Dashboard</button></li>
                <li><button class="nav-btn" data-panel="pages">Pages</button></li>
                <li><button class="nav-btn" data-panel="news">News</button></li>
                <li><button class="nav-btn" data-panel="events">Events</button></li>
                <li><button class="nav-btn" data-panel="gallery">Gallery</button></li>
                <li><button class="nav-btn" data-panel="carousel">Carousel</button></li>
                <li><button class="nav-btn" data-panel="notices">Notices</button></li>
                <li><button class="nav-btn" data-panel="settings">Settings</button></li>
            </ul>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Dashboard Panel -->
            <div id="dashboard" class="panel active">
                <h2>Dashboard</h2>
                <div class="stats-grid" id="statsGrid"></div>
                <div id="dashboardContent"></div>
            </div>

            <!-- Pages Panel -->
            <div id="pages" class="panel">
                <h2>Manage Pages</h2>
                <button class="btn-primary" id="addPageBtn">+ Add Page</button>
                <div id="pagesList" style="margin-top: 20px;"></div>
            </div>

            <!-- News Panel -->
            <div id="news" class="panel">
                <h2>Manage News</h2>
                <button class="btn-primary" id="addNewsBtn">+ Add News</button>
                <div id="newsList" style="margin-top: 20px;"></div>
            </div>

            <!-- Events Panel -->
            <div id="events" class="panel">
                <h2>Manage Events</h2>
                <button class="btn-primary" id="addEventBtn">+ Add Event</button>
                <div id="eventsList" style="margin-top: 20px;"></div>
            </div>

            <!-- Gallery Panel -->
            <div id="gallery" class="panel">
                <h2>Manage Gallery</h2>
                <button class="btn-primary" id="addGalleryBtn">+ Add Gallery Item</button>
                <div id="galleryList" style="margin-top: 20px;"></div>
            </div>

            <!-- Carousel Panel -->
            <div id="carousel" class="panel">
                <h2>Manage Carousel (Featured Images)</h2>
                <button class="btn-primary" id="addCarouselBtn">+ Add Image</button>
                <div id="carouselList" style="margin-top: 20px;"></div>
            </div>

            <!-- Notices Panel -->
            <div id="notices" class="panel">
                <h2>Manage Notices & Popups</h2>
                <button class="btn-primary" id="addNoticeBtn">+ Add Notice</button>
                <div id="noticesList" style="margin-top: 20px;"></div>
            </div>

            <!-- Settings Panel -->
            <div id="settings" class="panel">
                <h2>Settings</h2>
                <div id="settingsContent"></div>
            </div>
        </div>
    </div>

    <script src="firebase-init.js"></script>
    <script type="module" src="admin-app.js"></script>
    <script>
        document.getElementById('adminHamburger')?.addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('open');
        });
    </script>
</body>
</html>
